<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation: Ariz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#06080f;
overflow:hidden;
color:#e6faff;
}

/* Animated Neon Background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle at 25% 35%, rgba(0,255,255,0.2), transparent 40%),
radial-gradient(circle at 75% 70%, rgba(255,0,255,0.2), transparent 40%),
radial-gradient(circle at 50% 50%, rgba(0,150,255,0.15), transparent 50%);
animation:bgMove 20s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{transform:translate(0,0);}
50%{transform:translate(-15%,-15%);}
100%{transform:translate(0,0);}
}

/* Glass Panel */
.panel{
width:92%;
max-width:720px;
padding:40px;
border-radius:20px;
background:rgba(15,20,35,0.7);
backdrop-filter:blur(20px);
border:1px solid rgba(0,255,255,0.4);
box-shadow:0 0 40px rgba(0,255,255,0.25);
text-align:center;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0);}
}

h1{
margin-bottom:30px;
letter-spacing:2px;
text-shadow:0 0 15px #00f0ff;
}

#question{
font-size:20px;
line-height:1.8;
letter-spacing:1px;
min-height:110px;
margin-bottom:30px;
}

button{
width:100%;
padding:14px;
margin:12px 0;
border-radius:12px;
border:1px solid #00f0ff;
background:transparent;
color:#00f0ff;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00f0ff;
color:#06080f;
box-shadow:0 0 15px #00f0ff;
}

.hidden{
display:none;
}

#options{
transition:all 0.4s ease;
}
</style>
</head>

<body>

<div class="panel" id="menu">
<h1>Shall We Start Operation: Ariz</h1>
<button onclick="startGame()">Yes</button>
<button onclick="startGame()">Sure</button>
</div>

<div class="panel hidden" id="game">
<h1>Operation: Ariz</h1>
<div id="question"></div>
<div id="options"></div>
</div>

<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3"></audio>
<audio id="typeSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<script>

const data = [
{q:"Did Ariz once try to race a pigeon and lose badly?",a:"Yes absolutely",b:"Without a doubt"},
{q:"Is Ariz secretly scared of his own reflection?",a:"Confirmed yes",b:"Obviously yes"},
{q:"Did Ariz jump into a pool thinking it was a portal?",a:"He really did",b:"Legendary mistake"},
{q:"Does Ariz practice dramatic speeches alone?",a:"Yes every time",b:"Of course he does"},
{q:"Did Ariz blame WiFi for losing a game?",a:"Naturally yes",b:"Always yes"},
{q:"Is Ariz powered by overconfidence?",a:"Definitely",b:"Extremely"},
{q:"Did Ariz salute a ceiling fan once?",a:"Yes he did",b:"Absolutely"},
{q:"Does Ariz think he is the main character?",a:"Clearly yes",b:"Main character energy"},
{q:"Did Ariz try to download muscles?",a:"Yes he attempted",b:"Yes unsuccessfully"},
{q:"Is Ariz slightly dramatic for no reason?",a:"Yes always",b:"Very dramatic"},
{q:"Did Ariz scream during a horror movie?",a:"Yes instantly",b:"Without shame"},
{q:"Does Ariz overreact to small things?",a:"Yes massively",b:"Of course massively"},
{q:"Did Ariz argue with a mirror?",a:"Yes confidently",b:"Yes emotionally"},
{q:"Is Ariz officially certified chaos material?",a:"Approved by galaxy",b:"Verified chaos"}
];

let index = 0;

function startGame(){
document.getElementById("menu").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
loadQuestion();
}

function loadQuestion(){

if(index >= data.length){
document.getElementById("question").innerText =
"Mission Complete. Subject Ariz Successfully Annoyed.";
document.getElementById("options").innerHTML="";
return;
}

const opt = document.getElementById("options");
opt.style.opacity="0";
opt.style.transform="translateY(10px)";
opt.style.pointerEvents="none";

typeText(data[index].q);
}

function typeText(text){

const q = document.getElementById("question");
const typeSound = document.getElementById("typeSound");

q.innerHTML="";
let i=0;

let interval = setInterval(()=>{

q.innerHTML += text.charAt(i);

typeSound.currentTime=0;
typeSound.play();

i++;

if(i >= text.length){
clearInterval(interval);
setTimeout(showOptions,300);
}

},35);
}

function showOptions(){

const opt = document.getElementById("options");
const clickSound = document.getElementById("clickSound");

opt.innerHTML="";

["a","b"].forEach(letter=>{
let btn=document.createElement("button");
btn.innerText=data[index][letter];

btn.onclick=()=>{
clickSound.currentTime=0;
clickSound.play();
index++;
loadQuestion();
};

opt.appendChild(btn);
});

opt.style.opacity="1";
opt.style.transform="translateY(0)";
opt.style.pointerEvents="auto";
}

</script>

</body>
</html>
